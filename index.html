<model-viewer id="main-viewer" 
              src="videos/Dan.glb" 
              camera-controls 
              auto-rotate 
              autoplay
              animation-name="*"
              shadow-intensity="2">
</model-viewer>

<script>
    const viewer = document.getElementById('main-viewer');
    const audio = document.getElementById('audio-player');

    function switchCharacter(name) {
        // Update Model and Audio paths
        viewer.src = `videos/${name}.glb`;
        audio.src = `audio/${name}.mp3`;

        // THE FIX: Wait for the model to load, then force animation to play
        viewer.addEventListener('load', () => {
            viewer.play(); 
        }, { once: true });

        // Play audio
        audio.play().catch(e => console.log("Click a button to start audio"));
    }
</script>
