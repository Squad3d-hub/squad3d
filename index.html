<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD 3D - Главный Хаб</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Быстрые стили для теста, потом перенеси в style.css */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
        }
        .hub-btn {
            background: #1a1a1a;
            color: white;
            padding: 30px;
            text-decoration: none;
            border: 2px solid #333;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .hub-btn span {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .hub-btn:hover {
            border-color: #ff0000;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4);
            background: #222;
        }
        .footer {
            margin-top: 50px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>SQUAD 3D LAB</h1>
        <p>Выберите отсек для управления вашим юнитом Dummy 13</p>
    </header>

    <div class="menu-container">
        <a href="song.html" class="hub-btn">
            <span>🎵</span> АВАТАР И ПЕСНЯ
        </a>
        <a href="stem.html" class="hub-btn">
            <span>🔬</span> STEM ЛАБОРАТОРИЯ
        </a>
        <a href="lore.html" class="hub-btn">
            <span>📜</span> ГЕНЕРАТОР ИСТОРИЙ
        </a>
        <a href="jokes.html" class="hub-btn">
            <span>🤖</span> ШУТКИ DUMMY
        </a>
        <a href="comic.html" class="hub-btn">
            <span>🎨</span> КОМИКС
        </a>
        <a href="about.html" class="hub-btn">
            <span>👥</span> О КОМАНДЕ
        </a>
        <a href="welcome.html" class="hub-btn" style="border-style: dashed; color: #ffcc00;">
            <span>📲</span> ТЕСТ QR-ВХОДА
        </a>
    </div>

    <div class="footer">
        © 2024 SQUAD 3D: DAN • DAVE • VAL • BELLA
    </div>

</body>
</html>
