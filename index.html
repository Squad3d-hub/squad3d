<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Hub</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: #eee;
            font-family: sans-serif;
            text-align: center;
        }

        model-viewer {
            width: 100%;
            height: 70vh;
            background: radial-gradient(#222, #000);
        }

        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #444;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #00ffcc;
            color: black;
        }

        #status {
            margin-top: 10px;
            color: #888;
        }
    </style>
</head>
<body>

    <model-viewer id="view" 
                  src="videos/Dan.glb" 
                  camera-controls 
                  autoplay 
                  animation-name="*" 
                  shadow-intensity="1">
    </model-viewer>

    <div class="controls">
        <button onclick="playChar('Dan')">DAN</button>
        <button onclick="playChar('Dave')">DAVE</button>
        <button onclick="playChar('Val')">VAL</button>
    </div>

    <p id="status">Click a button to start</p>

    <audio id="player"></audio>

    <script>
        const v = document.getElementById('view');
        const a = document.getElementById('player');
        const s = document.getElementById('status');

        function playChar(name) {
            s.innerText = "Loading " + name + "...";
            
            // Set paths
            v.src = `videos/${name}.glb`;
            a.src = `audio/${name}.mp3`;

            // Wait for 3D model to load before playing
            v.addEventListener('load', () => {
                v.play(); // Play 3D animation
                a.play().catch(err => {
                    s.innerText = "Error: Click again to play sound.";
                });
                s.innerText = "Now playing: " + name;
            }, { once: true });
        }
    </script>
</body>
</html>
