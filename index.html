<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Player</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent-color: #00ffcc;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* 3D Viewer Container */
        model-viewer {
            width: 100%;
            height: 60vh;
            background: radial-gradient(#333, #000);
        }

        /* UI Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            cursor: pointer;
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .status {
            margin-top: 15px;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

    <model-viewer id="main-viewer" 
                  src="videos/Dan.glb" 
                  camera-controls 
                  auto-rotate 
                  shadow-intensity="2" 
                  exposure="1">
    </model-viewer>

    <div class="controls">
        <button onclick="switchCharacter('Dan')">DAN</button>
        <button onclick="switchCharacter('Dave')">DAVE</button>
        <button onclick="switchCharacter('Val')">VAL</button>
    </div>

    <div class="status" id="playing-text">Select a character to play audio</div>

    <audio id="audio-player"></audio>

    <script>
        const viewer = document.getElementById('main-viewer');
        const audio = document.getElementById('audio-player');
        const statusText = document.getElementById('playing-text');

        function switchCharacter(name) {
            // 1. Update the 3D Model Path
            // Note: Your request mentioned "Val.gld" - I corrected this to .glb for the code
            const modelPath = `videos/${name}.glb`;
            viewer.src = modelPath;

            // 2. Update the Audio Path
            const audioPath = `audio/${name}.mp3`;
            audio.src = audioPath;
            
            // 3. Play Audio
            // Browser policy requires a user click to play sound
            audio.play().catch(error => {
                console.log("Audio play blocked: Interaction required first.");
            });

            // 4. Update UI
            statusText.innerText = `Currently viewing: ${name}`;
        }
    </script>

</body>
</html>
