<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Character Hub</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            color: #eee;
            font-family: sans-serif;
            text-align: center;
        }

        model-viewer {
            width: 100%;
            height: 70vh;
            background: radial-gradient(#222, #000);
        }

        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #444;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #00ffcc;
            color: black;
        }

        #status {
            margin-top: 10px;
            color: #888;
        }
    </style>
</head>
<body>

    <model-viewer id="view" 
                  src="videos/Dan.glb" 
                  camera-controls 
                  autoplay 
                  animation-name="*" 
                  shadow-intensity="1">
    </model-viewer>

    <div class="controls">
        <button onclick="playChar('Dan')">DAN</button>
        <button onclick="playChar('Dave')">DAVE</button>
        <button onclick="playChar('Val')">VAL</button>
    </div>

    <p id="status">Click a button to start</p>

    <audio id="player"></audio>

   <script>
    const v = document.getElementById('view');
    const a = document.getElementById('player');
    const s = document.getElementById('status');

    function playChar(name) {
        s.innerText = "Attempting to load: " + name;
        
        // Force the paths to be relative to the current folder
        const modelPath = "videos/" + name + ".glb";
        const audioPath = "audio/" + name + ".mp3";

        console.log("Loading Model:", modelPath);
        console.log("Loading Audio:", audioPath);

        v.src = modelPath;
        a.src = audioPath;

        // Catch errors if the model fails to load
        v.addEventListener('error', (error) => {
            alert("CANNOT FIND FILE: Check if " + modelPath + " is spelled correctly on GitHub (Capital letters matter!)");
            console.error(error);
        }, { once: true });

        v.addEventListener('load', () => {
            s.innerText = "Model Loaded! Starting audio...";
            v.play();
            a.play().catch(err => {
                s.innerText = "Click the screen to enable sound.";
            });
        }, { once: true });
    }
    </script>
</body>
</html>
