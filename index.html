<!DOCTYPE html>
<html>
<head>
    <title>SQUAD 3D | Dossier</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <h1>SQUAD 3D LAB</h1>

    <div class="stem-card">
        <h3>UNIT PREVIEW (3D)</h3>
        <model-viewer id="main-bot" 
            src="images/Dan.glb" 
            auto-rotate camera-controls 
            shadow-intensity="1" 
            style="width: 100%; height: 350px;">
        </model-viewer>
        
        <div id="file-panel">
            <h2 id="bot-name">UNIT: DAN</h2>
            <p id="bot-lore">Carbon Fiber Armor. Specialized in Heavy Bass.</p>
        </div>
    </div>

    <div class="stem-card">
        <h3>FIELD PERFORMANCE</h3>
        <video width="100%" controls loop muted style="border-radius: 10px;">
            <source src="video/performance.mp4" type="video/mp4">
        </video>
    </div>

    <div class="stem-card">
        <h3>SYSTEM AUDIO</h3>
        <audio controls style="width: 100%;">
            <source src="audio/squad-track.mp3" type="audio/mpeg">
        </audio>
    </div>

    <nav>
        <button onclick="window.location.href='stem.html'">SCIENCE</button>
        <button onclick="window.location.href='shop.html'">STORE</button>
        <button onclick="window.location.href='fun.html'">FUN</button>
    </nav>

</body>
</html>
