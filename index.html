<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SQUAD 3D | Dossier</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <h1>UNIT DOSSIER</h1>
    
    <model-viewer id="main-bot" src="images/your_robot.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>

    <div id="file-panel" class="stem-card">
        <h2 id="bot-name">SELECT A UNIT</h2>
        <p id="bot-lore">Scan a QR code or select a member below.</p>
        <div id="stats">
            POWER: <div class="stat-bar"><div id="p-bar" class="stat-fill" style="width: 0%;"></div></div>
            FLOW: <div class="stat-bar"><div id="f-bar" class="stat-fill" style="width: 0%;"></div></div>
        </div>
    </div>

    <nav>
        <button onclick="window.location.href='stem.html'">LAB (STEM)</button>
        <button onclick="window.location.href='shop.html'">SHOP</button>
        <button onclick="window.location.href='fun.html'">FUN</button>
        <button onclick="window.location.href='song.html'">DANCE Performance</button>
    </nav>

    <script>
        const botData = {
            dan: { name: "UNIT: DAN (BASS)", p: "95%", f: "70%", class: "dan-filter", lore: "Reinforced PETG frame. Optimized for heavy bass environments." },
            val: { name: "UNIT: VAL (STEM)", p: "65%", f: "90%", class: "val-filter", lore: "High-precision joints. Specialized in fluid motion capture." },
            dave: { name: "UNIT: DAVE (GLITCH)", p: "80%", f: "85%", class: "dave-filter", lore: "Carbon Fiber armor. Features integrated Neural-Link audio." }
        };

        function updateDossier(unit) {
            const data = botData[unit];
            if (!data) return;
            document.getElementById('bot-name').innerText = data.name;
            document.getElementById('bot-lore').innerText = data.lore;
            document.getElementById('p-bar').style.width = data.p;
            document.getElementById('f-bar').style.width = data.f;
            document.getElementById('main-bot').className = data.class;
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const robot = urlParams.get('robot');
            if (robot) updateDossier(robot);
        };
    </script>
</body>
</html>
